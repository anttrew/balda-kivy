name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run engine tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          pytest -q

  build-android:
    name: Build debug APK
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Buildozer
        id: buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: balda-debug-apk
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30

      - name: Publish GitHub Release for tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.buildozer.outputs.filename }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "$APK_PATH" \
            --title "Balda ${GITHUB_REF_NAME}" \
            --notes "Debug APK для ручной установки на Android."
